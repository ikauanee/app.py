<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rateio Norte Saneamento</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        .upload-area {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .upload-card {
            border: 2px dashed #ddd;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-card:hover { border-color: #2a5298; background: #f0f4ff; }
        .upload-card .icon { font-size: 40px; margin-bottom: 10px; }
        .upload-card h3 { margin-bottom: 5px; color: #333; }
        .upload-card p { font-size: 0.8em; color: #666; }
        .upload-card .file-name { font-size: 0.75em; color: #28a745; margin-top: 10px; }
        .upload-card input { display: none; }
        
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .loading.show { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2a5298;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .results-area {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .results-area.show { display: block; animation: fadeIn 0.5s; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .resumo-card {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .resumo-card .valor { font-size: 1.5em; font-weight: bold; }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            font-weight: 600;
            color: #666;
        }
        
        .tab.active {
            color: #2a5298;
            border-bottom: 3px solid #2a5298;
        }
        
        .tab-content { display: none; overflow-x: auto; }
        .tab-content.active { display: block; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }
        
        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-weight: 600;
        }
        
        tr:hover { background: #f5f5f5; }
        .total-row { background: #e8f0fe; font-weight: bold; }
        .alert { padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        
        @media (max-width: 768px) {
            .upload-grid { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            th, td { font-size: 0.7em; padding: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 RATEIO NORTE SANEAMENTO</h1>
            <p>ABRIL/2026 - Consumo e rateio por unidade</p>
        </div>
        
        <div class="upload-area">
            <div class="upload-grid">
                <div class="upload-card" data-type="conversas">
                    <div class="icon">💬</div>
                    <h3>Conversas</h3>
                    <p>conversas.csv</p>
                    <div class="file-name" id="conversas-name"></div>
                    <input type="file" id="conversas" accept=".csv">
                </div>
                <div class="upload-card" data-type="campanhas">
                    <div class="icon">📢</div>
                    <h3>Campanhas</h3>
                    <p>campanhas.csv</p>
                    <div class="file-name" id="campanhas-name"></div>
                    <input type="file" id="campanhas" accept=".csv">
                </div>
                <div class="upload-card" data-type="presencial">
                    <div class="icon">🏢</div>
                    <h3>Presencial</h3>
                    <p>presencial.csv</p>
                    <div class="file-name" id="presencial-name"></div>
                    <input type="file" id="presencial" accept=".csv">
                </div>
                <div class="upload-card" data-type="usuarios">
                    <div class="icon">👥</div>
                    <h3>Usuários</h3>
                    <p>usuarios.csv</p>
                    <div class="file-name" id="usuarios-name"></div>
                    <input type="file" id="usuarios" accept=".csv">
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="baixarModelos()">📥 Baixar Modelos CSV</button>
                <button class="btn btn-primary" onclick="processarArquivos()" id="processBtn">🚀 Gerar Rateio</button>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processando arquivos e calculando rateio...</p>
        </div>
        
        <div class="results-area" id="results">
            <div class="results-header">
                <h2>📈 Resultado do Rateio - ABRIL/2026</h2>
                <button class="btn btn-primary" onclick="baixarExcel()">📥 Baixar Excel Completo</button>
            </div>
            
            <div id="alert"></div>
            
            <div class="resumo-card" id="resumo"></div>
            
            <div class="tabs">
                <button class="tab active" onclick="showTab('percentuais')">📊 Percentuais por Item</button>
                <button class="tab" onclick="showTab('valores')">💰 Rateio de Valores (R$)</button>
            </div>
            
            <div id="tab-percentuais" class="tab-content active">
                <div class="table-wrapper" id="table-percentuais"></div>
            </div>
            
            <div id="tab-valores" class="tab-content">
                <div class="table-wrapper" id="table-valores"></div>
            </div>
        </div>
    </div>
    
    <script>
        let excelBase64 = null;
        
        document.querySelectorAll('.upload-card').forEach(card => {
            const input = card.querySelector('input');
            const type = card.dataset.type;
            card.addEventListener('click', () => input.click());
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                const span = document.getElementById(`${type}-name`);
                if (file) span.innerHTML = `✅ ${file.name}`;
                else span.innerHTML = '';
            });
        });
        
        async function processarArquivos() {
            const formData = new FormData();
            const files = ['conversas', 'campanhas', 'presencial', 'usuarios'];
            let hasFiles = false;
            
            files.forEach(fileId => {
                const input = document.getElementById(fileId);
                if (input.files.length > 0) {
                    formData.append(fileId, input.files[0]);
                    hasFiles = true;
                }
            });
            
            if (!hasFiles) {
                mostrarAlerta('⚠️ Selecione pelo menos um arquivo CSV!', 'error');
                return;
            }
            
            const processBtn = document.getElementById('processBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            processBtn.disabled = true;
            loading.classList.add('show');
            results.classList.remove('show');
            
            try {
                const response = await fetch('/processar', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.success) {
                    excelBase64 = data.excel_base64;
                    mostrarResumo(data.resumo);
                    mostrarTabelaPercentuais(data.tabela_percentuais);
                    mostrarTabelaValores(data.tabela_valores);
                    mostrarAlerta(data.mensagem, 'success');
                    results.classList.add('show');
                } else {
                    mostrarAlerta(`❌ Erro: ${data.erro}`, 'error');
                }
            } catch (error) {
                mostrarAlerta(`❌ Erro: ${error.message}`, 'error');
            } finally {
                processBtn.disabled = false;
                loading.classList.remove('show');
            }
        }
        
        function mostrarResumo(resumo) {
            const div = document.getElementById('resumo');
            div.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
                    <div>📊 Total Conversas: <strong>${resumo.total_conversas.toLocaleString()}</strong></div>
                    <div>👥 Total Usuários: <strong>${resumo.total_usuarios}</strong></div>
                    <div>🏢 Atendimento Presencial: <strong>${resumo.total_presencial}</strong></div>
                    <div>📢 Marketing: <strong>${resumo.total_marketing}</strong></div>
                    <div>💬 Utility: <strong>${resumo.total_utility}</strong></div>
                    <div>💰 TOTAL GERAL: <strong style="color: #28a745;">R$ ${resumo.valor_total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</strong></div>
                </div>
            `;
        }
        
        function mostrarTabelaPercentuais(dados) {
            if (!dados || dados.length === 0) return;
            
            const colunas = ['Unidade', 'Franquia (%)', 'Mensagens Receptivas (%)', 'Licenças Excedentes (%)', 
                           'Atendimento Presencial (%)', 'WhatsApp Marketing (%)', 'WhatsApp Utility (%)', 'Número Oficial WhatsApp (%)'];
            
            let html = '<table><thead><tr>';
            colunas.forEach(col => html += `<th>${col}</th>`);
            html += '</tr></thead><tbody>';
            
            dados.forEach(row => {
                html += '<tr>';
                colunas.forEach(col => {
                    let valor = row[col];
                    if (typeof valor === 'number') valor = valor.toFixed(2).replace('.', ',') + '%';
                    html += `<td>${valor || 0}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            document.getElementById('table-percentuais').innerHTML = html;
        }
        
        function mostrarTabelaValores(dados) {
            if (!dados || dados.length === 0) return;
            
            const colunas = ['Unidade', 'Franquia (R$)', 'Mensagens Receptivas (R$)', 'Licenças Excedentes (R$)',
                           'Atendimento Presencial (R$)', 'WhatsApp Marketing (R$)', 'WhatsApp Utility (R$)', 
                           'Número Oficial WhatsApp (R$)', 'Total por Unidade (R$)'];
            
            let html = '<table><thead><tr>';
            colunas.forEach(col => html += `<th>${col}</th>`);
            html += '</tr></thead><tbody>';
            
            dados.forEach(row => {
                html += '<tr>';
                colunas.forEach(col => {
                    let valor = row[col];
                    if (typeof valor === 'number') valor = 'R$ ' + valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});
                    html += `<td>${valor || 0}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            document.getElementById('table-valores').innerHTML = html;
        }
        
        function mostrarAlerta(mensagem, tipo) {
            const alertDiv = document.getElementById('alert');
            alertDiv.innerHTML = `<div class="alert alert-${tipo}">${mensagem}</div>`;
            setTimeout(() => alertDiv.innerHTML = '', 5000);
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'percentuais') {
                document.querySelector('.tab').classList.add('active');
                document.getElementById('tab-percentuais').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('tab-valores').classList.add('active');
            }
        }
        
        function baixarExcel() {
            if (excelBase64) {
                const link = document.createElement('a');
                link.href = `data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,${excelBase64}`;
                link.download = `rateio_norte_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
                link.click();
            } else {
                mostrarAlerta('Nenhum relatório disponível', 'error');
            }
        }
        
        async function baixarModelos() {
            try {
                const response = await fetch('/baixar_modelo');
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = 'modelos_csv.zip';
                link.click();
                URL.revokeObjectURL(link.href);
                mostrarAlerta('✅ Modelos baixados!', 'success');
            } catch (error) {
                mostrarAlerta('❌ Erro ao baixar modelos', 'error');
            }
        }
    </script>
</body>
</html>
